<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Datos IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.card{
  background:#1e1e1e;
  padding:20px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
}
</style>

</head>
<body>

<h1> Sensores ESP32</h1>

<div class="card">
<h2>Temperatura</h2>
<h1 id="temp">--</h1>
</div>

<div class="card">
<h2>Humedad</h2>
<h1 id="hum">--</h1>
</div>

<div class="card">
<h2>Presión</h2>
<h1 id="pres">--</h1>
</div>

<div class="card">
<h2>Promedio Temp</h2>
<h1 id="promTemp">--</h1>
</div>

<div class="card">
<h2>Promedio Hum</h2>
<h1 id="promHum">--</h1>
</div>

<canvas id="grafica"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyCm9_eJlfq_DEObXcULBNIUUxNW5-cx53E",
  databaseURL: "https://esp32-cf2b3-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


const tempRef = ref(db, "sensores/temperatura");
const humRef = ref(db, "sensores/humedad");
const presRef = ref(db, "sensores/presion");
const historialRef = ref(db, "historial");


const ctx = document.getElementById("grafica");

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {label:"Temperatura", data:[]},
      {label:"Humedad", data:[]}
    ]
  }
});


function agregarDato(temp, hum){
  const hora = new Date().toLocaleTimeString();

  chart.data.labels.push(hora);
  chart.data.datasets[0].data.push(temp);
  chart.data.datasets[1].data.push(hum);

  if(chart.data.labels.length > 20){
    chart.data.labels.shift();
    chart.data.datasets.forEach(d => d.data.shift());
  }

  chart.update();
}

function promedio(lista){
  let suma = 0;
  lista.forEach(v => suma += v);
  return (suma / lista.length).toFixed(2);
}


onValue(tempRef, snap => {
  document.getElementById("temp").innerText = snap.val();
});

onValue(humRef, snap => {
  document.getElementById("hum").innerText = snap.val();
});

onValue(presRef, snap => {
  document.getElementById("pres").innerText = snap.val();
});

onValue(historialRef, snap => {

  const datos = snap.val();
  if(!datos) return;

  let temps = [];
  let hums = [];

  Object.values(datos).forEach(d => {
    temps.push(d.temperatura);
    hums.push(d.humedad);

    agregarDato(d.temperatura, d.humedad);
  });

  document.getElementById("promTemp").innerText = promedio(temps);
  document.getElementById("promHum").innerText = promedio(hums);

});

</script>

</body>
</html>
